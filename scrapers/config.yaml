      - "brand_aesthetic"
      - "packaging"
      - "color_range"
      - "customer_service"
      - "sustainability"
    expected_monthly_volume: "medium"

# Scraping configuration
scraping:
  schedule:
    instagram: "every_12_hours"
    tiktok: "every_12_hours"
    reddit: "every_6_hours"
    news: "every_6_hours"
    youtube: "every_24_hours"

  limits:
    max_mentions_per_brand_per_run: 60
    max_total_mentions_per_run: 250
    historical_window_days: 30  # last 30 days for richer dataset

  quality_filters:
    min_text_length_chars: 20
    max_text_length_chars: 5000
    exclude_languages: []
    require_brand_mention_in_text: true  # Already filtered at source via brand keywords

# LLM analysis configuration
analysis:
  model: "claude-sonnet-4-20250514"
  batch_size: 20
  temperature: 0.1
  max_tokens: 1024

  topics_taxonomy:
    - "efficacy_results"
    - "texture_consistency"
    - "packaging_design"
    - "scent_fragrance"
    - "price_value"
    - "ingredients_formulation"
    - "irritation_reactions"
    - "sustainability_ethics"
    - "customer_service"
    - "shipping_delivery"
    - "comparison_vs_competitor"
    - "duplicates_dupes"
    - "routine_layering"
    - "influencer_recommendation"
    - "celebrity_endorsement"
    - "new_launch"
    - "restock_availability"
    - "discount_promo"
    - "subscription_model"
    - "allergic_reaction"

  crisis_signals:
    - "product_recall"
    - "safety_alert"
    - "viral_negative_ingredient_claim"
    - "labor_practice_accusation"
    - "lawsuit_class_action"
    - "celebrity_pullout"
    - "regulatory_warning"
    - "supply_chain_issue"
    - "founders_leaving"
    - "out_of_stock_critical"

  sentiment_thresholds:
    positive: 4
    neutral: 3
    negative: 2

# Reporting configuration
reporting:
  pdf_template: "./report_generator/template.html"
  sections:
    - "executive_summary"
    - "brand_comparison"
    - "trending_topics"
    - "top_mentions"
    - "crisis_alerts"
    - "next_week_focus"

  looker_studio:
    default_date_range: "last_30_days"
    refresh_frequency: "daily"
