name: Brand Health Tracker - LIVE

on:
  workflow_dispatch:
    inputs:
      brands:
        description: "Comma-separated brand keys (leave empty for all)"
        required: false
        default: ""
      platforms:
        description: "Comma-separated platforms (leave empty for all)"
        required: false
        default: ""
  schedule:
    # Every Monday at 8am UTC
    - cron: "0 8 * * 1"

jobs:
  live-pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install gspread google-auth

      - name: Validate SA and Sheet ID
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
        run: |
          echo "=== Writing SA JSON ==="
          printf '%s' "$GOOGLE_SERVICE_ACCOUNT_JSON" > /tmp/gcp-sa.json
          echo "File size: $(wc -c < /tmp/gcp-sa.json) bytes"
          echo ""
          echo "=== Validate JSON parses ==="
          python3 -c "
          import json
          with open('/tmp/gcp-sa.json') as f:
              sa = json.load(f)
          print('JSON parses OK')
          print('Project:', sa.get('project_id'))
          print('Client email:', sa.get('client_email'))
          "

      - name: Run live pipeline (scrape + AI analyze + write to Google Sheets)
        env:
          APIFY_TOKEN: ${{ secrets.APIFY_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          CLAUDE_MODEL: claude-sonnet-4-5
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          GOOGLE_SHEETS_ID: 1-_RLwe2W3GmIxD8X5ZfI0pmOfuc9W0nkX6gND26DPQQ
        run: |
          # Conservative defaults for fast, successful runs
          # Override via workflow_dispatch inputs to scale up
          # Uses local_pipeline.py - outputs CSV + PDF (no Google Sheets auth issues)
          python scripts/local_pipeline.py \
            --brands glossier \
            --platforms reddit

      - name: Upload run artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: brand-tracker-reports-${{ github.run_number }}
          path: |
            output/*.pdf
            data/raw/*.csv
            data/enriched/*.csv
          retention-days: 7


