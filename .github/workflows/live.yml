name: Brand Health Tracker - LIVE

on:
  workflow_dispatch:
    inputs:
      brands:
        description: "Comma-separated brand keys (leave empty for all)"
        required: false
        default: ""
      platforms:
        description: "Comma-separated platforms (leave empty for all)"
        required: false
        default: ""
  schedule:
    # Every Monday at 8am UTC
    - cron: "0 8 * * 1"

jobs:
  live-pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install gspread google-auth

      - name: Run live pipeline (scrape + AI analyze + write to Google Sheets)
        env:
          APIFY_TOKEN: ${{ secrets.APIFY_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          CLAUDE_MODEL: claude-3-5-sonnet-latest
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          GOOGLE_SHEETS_ID: 1-_RLwe2W3GmIxD8X5ZfI0pmOfuc9W0nkX6gND26DPQQ
        run: |
          # DEBUG: Write SA JSON to file and validate
          echo "=== Writing SA JSON ==="
          echo "$GOOGLE_SERVICE_ACCOUNT_JSON" > /tmp/gcp-sa.json
          echo "File size: $(wc -c < /tmp/gcp-sa.json) bytes"
          echo "First 100 chars: $(head -c 100 /tmp/gcp-sa.json)"
          echo ""
          echo "=== Validate JSON parses ==="
          python3 -c "
import json, sys
try:
    with open('/tmp/gcp-sa.json') as f:
        sa = json.load(f)
    print('JSON parses OK')
    print('Project:', sa.get('project_id'))
    print('Client email:', sa.get('client_email'))
    print('Type:', sa.get('type'))
except Exception as e:
    print(f'JSON PARSE ERROR: {e}')
    sys.exit(1)
"
