name: Test Service Account

on:
  workflow_dispatch:

jobs:
  test-sa:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Write SA JSON
        run: |
          echo "$GOOGLE_SERVICE_ACCOUNT_JSON" > /tmp/gcp-sa.json
          echo "=== File contents ==="
          cat /tmp/gcp-sa.json
          echo ""
          echo "=== File size ==="
          ls -la /tmp/gcp-sa.json

      - name: Test SA with gcloud auth
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
        run: |
          echo "$GOOGLE_SERVICE_ACCOUNT_JSON" > /tmp/gcp-sa.json
          echo "=== Activating SA ==="
          gcloud auth activate-service-account --key-file=/tmp/gcp-sa.json 2>&1 | head -20
          echo ""
          echo "=== Active account ==="
          gcloud auth list 2>&1 | head -10
          echo ""
          echo "=== Project ID ==="
          python3 -c "
          import json
          with open('/tmp/gcp-sa.json') as f:
              sa = json.load(f)
          print('Project:', sa.get('project_id'))
          print('Client email:', sa.get('client_email'))
          print('Type:', sa.get('type'))
          "

      - name: Test gspread auth
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
        run: |
          echo "$GOOGLE_SERVICE_ACCOUNT_JSON" > /tmp/gcp-sa.json
          pip install gspread google-auth 2>&1 | tail -3
          python3 -c "
          import json
          import gspread
          from google.oauth2.service_account import Credentials

          with open('/tmp/gcp-sa.json') as f:
              sa = json.load(f)

          print('Project:', sa.get('project_id'))
          print('Client email:', sa.get('client_email'))

          scopes = ['https://www.googleapis.com/auth/spreadsheets', 'https://www.googleapis.com/auth/drive']
          creds = Credentials.from_service_account_file('/tmp/gcp-sa.json', scopes=scopes)
          client = gspread.authorize(creds)

          sheet_id = '1-_RLwe2W3GmIxD8X5ZfI0pmOfuc9W0nkX6gND26DPQQ'
          try:
              sheet = client.open_by_key(sheet_id)
              print('SUCCESS! Sheet title:', sheet.title)
          except Exception as e:
              print(f'ERROR opening sheet: {type(e).__name__}: {e}')
          "
